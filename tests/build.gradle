// Spock unit test harness for Hubitat driver pure-function logic.
// Confined to tests/ — not wired to the repo root build system.
// Run: ./gradlew test (or gradlew.bat test on Windows)
plugins {
    id 'groovy'
}

repositories {
    mavenCentral()
}

dependencies {
    // Groovy 3.0.x — stable on Java 8 + 11 + 17
    implementation 'org.codehaus.groovy:groovy:3.0.21'
    // Spock 2.3 on Groovy 3
    testImplementation 'org.spockframework:spock-core:2.3-groovy-3.0'
    // JUnit 5 engine (Spock 2.x requires JUnit Platform)
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.2'
}

test {
    useJUnitPlatform()
}

// Helpers live under src/test/groovy alongside the specs.
sourceSets {
    test {
        groovy {
            srcDirs = ['src/test/groovy']
        }
    }
}
